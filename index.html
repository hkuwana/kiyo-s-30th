<!DOCTYPE html>
<html lang="en" data-theme="caramellatte">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>三十. A scrapbook for Kiyo</title>
<meta name="description" content="A scrapbook for Kiyomasa Kuwana · 桑名清正 · turning thirty on May 20, 2026. From his sister and brother.">
<meta name="author" content="Hiro & Arisa">

<!-- Private gift site: keep off search engines and AI crawlers. -->
<meta name="robots" content="noindex, nofollow, noarchive">

<!-- Open Graph (Slack / Messages / Discord / WhatsApp link previews) -->
<meta property="og:type" content="website">
<meta property="og:title" content="三十. A scrapbook for Kiyo">
<meta property="og:description" content="Thirty trips around the sun. A scrapbook for Kiyomasa Kuwana · 桑名清正 · May 20, 2026.">
<meta property="og:image" content="src/photos/optimized/img-8927.jpg">
<meta property="og:image:alt" content="A polaroid from Kiyo's 30th birthday scrapbook.">
<meta property="og:locale" content="en_US">
<meta property="og:locale:alternate" content="ja_JP">

<!-- Twitter / X card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="三十. A scrapbook for Kiyo">
<meta name="twitter:description" content="Thirty trips around the sun. May 20, 2026.">
<meta name="twitter:image" content="src/photos/optimized/img-8927.jpg">

<!-- Theme color for mobile address bars -->
<meta name="theme-color" content="#f7f0e1">

<!-- Inline SVG favicon: cream square with terracotta "30" -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23f7f0e1'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Georgia,serif' font-style='italic' font-size='34' fill='%23c46a3e'%3E30%3C/text%3E%3C/svg%3E">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="src/styles.css">
</head>
<body class="paper-grain">

  <!-- ============================ PENCIL CURSOR ============================ -->
  <canvas id="pencil-canvas"></canvas>

  <!-- ============================ ENTRY SCREEN ============================= -->
  <div class="entry-screen" id="entry">

    <!-- 1. Typewriter -->
    <div class="text-center">
      <div class="eyebrow-mini mb-6">A scrapbook for</div>
      <div class="typewriter-line" id="typewriter-target"></div>
    </div>

    <!-- 2. Password card -->
    <div id="password-stage" style="display:none;flex-direction:column;align-items:center;gap:1.25rem;">
      <div class="password-card" id="password-card">
        <div class="eyebrow-mini" style="text-align:center;margin-bottom:0.4rem;">enter date of birth</div>
        <div class="ruled-line"></div>
        <div class="date-inputs">
          <div class="date-input-wrap">
            <label>month</label>
            <input class="date-input" id="pwd-mm" type="text" inputmode="numeric" maxlength="2" placeholder="MM" autocomplete="off">
          </div>
          <div class="date-input-wrap">
            <label>day</label>
            <input class="date-input" id="pwd-dd" type="text" inputmode="numeric" maxlength="2" placeholder="DD" autocomplete="off">
          </div>
          <div class="date-input-wrap">
            <label>year</label>
            <input class="date-input" id="pwd-yyyy" type="text" inputmode="numeric" maxlength="4" placeholder="YYYY" autocomplete="off">
          </div>
        </div>
        <div class="submit-row">
          <div id="pwd-error" style="font-family:var(--font-hand);color:var(--terracotta);font-size:1.05rem;min-height:1.3em;"></div>
          <button class="submit-btn" id="pwd-submit">open →</button>
        </div>
      </div>
      <div class="hint-text">psst, it's yours.</div>
    </div>

    <!-- 3. Candle loader (hidden until password correct) -->
    <div class="candle-stage" id="candle-stage" style="display:none;">
      <div class="candles-row" id="candles-row">
        <!-- 30 candles -->
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
        <div class="candle"><span class="flame"></span><span class="wick"></span><span class="wax"></span></div>
      </div>
      <div class="cake-board"></div>
      <div class="loader-label">
        lighting candles · <span class="count" id="candle-count">00</span><span style="opacity:0.4">&nbsp;/&nbsp;30</span>
      </div>
      <div class="loader-label" id="candle-status" style="opacity:0.7;">one for each year</div>
    </div>

  </div>

  <!-- ============================ MAIN SITE ================================ -->
  <div id="site-wrap" class="site-wrap" style="display:none;">

    <!-- Audio controls -->
    <div class="controls" style="position:fixed;top:1.25rem;right:1.25rem;z-index:60;display:flex;gap:0.5rem;align-items:center;background:oklch(98% 0.016 73.684 / 0.85);backdrop-filter:blur(10px);padding:0.5rem 0.6rem;border-radius:999px;box-shadow:0 4px 16px -4px var(--paper-shadow);">
      <button class="control-btn" id="audio-btn" aria-label="ambient audio" title="ambient sound">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span id="audio-label" style="font-size:0.7rem;font-family:var(--font-body);letter-spacing:0.05em;font-weight:600;line-height:1;"></span>
      </button>
      <div class="audio-menu" id="audio-menu">
        <button data-mode="musicbox"><span class="dot"></span>music box</button>
        <button data-mode="lullaby"><span class="dot"></span>soft lullaby</button>
        <button data-mode="chimes"><span class="dot"></span>glass chimes</button>
      </div>
    </div>

    <!-- Title strip -->
    <header class="title-strip" data-screen-label="00 Title">
      <div class="eyebrow-mini" style="margin-bottom:2rem;">May 20, 2026 · for Kiyomasa Kuwana · 桑名清正</div>
      <h1 class="title-display"><span id="title-1">Thirty trips</span><br><span id="title-2">around the sun.</span></h1>
      <div style="margin-top:1.5rem;font-family:var(--font-display);font-style:italic;font-weight:300;font-size:clamp(1.4rem, 2.6vw, 2rem);color:var(--terracotta);letter-spacing:0.04em;">三十回、太陽のまわりを。</div>
      <div class="title-meta" id="title-meta"></div>

      <!-- Decorative scribble under title -->
      <svg style="display:block;margin:3rem auto 0;width:120px;height:30px" viewBox="0 0 120 30">
        <path class="scribble-stroke" stroke-width="1.5"
          d="M6 18 Q 25 6, 60 16 T 114 14" />
        <path class="scribble-stroke heart" stroke-width="1.5"
          d="M58 24 l 4 -4 l 4 4" />
      </svg>
    </header>

    <!-- Chapters render here -->
    <main id="chapters"></main>

    <!-- Ending -->
    <section class="ending" data-screen-label="05 Ending">
      <div class="ending-inner">
        <div class="polaroid ending-polaroid" id="ending-polaroid"></div>
        <div class="letter" id="letter"></div>
        <div class="guestbook">
          <h3>everyone who showed up.</h3>
          <div class="sub">the guestbook</div>
          <div class="signatures" id="signatures"></div>
        </div>
        <div class="footer-final">end. · for kiyo · 1996 — forever · 三十</div>
      </div>
    </section>

  </div>

  <!-- ============================ BUBBLES LAYER ============================ -->
  <div class="bubble-layer" id="bubble-layer"></div>

  <!-- ============================ MODAL =================================== -->
  <div class="modal-backdrop" id="modal-back">
    <div class="message-card" id="message-card"></div>
  </div>

  <!-- ============================ SCRIPTS ================================= -->
  <script src="src/data.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
